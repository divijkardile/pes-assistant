version: "3.9"

services:

  pes-assistant:

    build: .

    container_name: pes-assistant

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - qdrant
      - ollama

    environment:
      QDRANT_HOST: qdrant
      OLLAMA_HOST: http://ollama:11434

  qdrant:

    image: qdrant/qdrant:latest

    container_name: qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:

    image: ollama/ollama:latest

    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama

volumes:

  qdrant_storage:

  ollama: