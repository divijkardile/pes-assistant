services:

  pes-assistant:

    build:
      context: .

    container_name: pes-assistant

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      QDRANT_HOST: qdrant
      OLLAMA_HOST: http://ollama:11434

    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started

  qdrant:

    image: qdrant/qdrant:latest

    container_name: qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:

    image: ollama/ollama:latest

    container_name: ollama

    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama

    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        sleep 5

        ollama pull llama3.2
        ollama pull nomic-embed-text

        wait

volumes:

  qdrant_storage:

  ollama: